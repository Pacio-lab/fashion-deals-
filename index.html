#bg-pattern {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(circle at 20% 10%, rgba(200,169,110,0.07) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(212,104,138,0.05) 0%, transparent 50%);
}

header {
  position: relative; z-index: 10;
  border-bottom: 1px solid #2a2520;
  background: rgba(14,12,10,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 52px 20px 0;
}
.header-inner { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.header-label { font-size: 10px; letter-spacing: 0.25em; color: #6b5e4e; font-weight: 500; margin-bottom: 5px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: #e8e0d5; line-height: 1.15; }
h1 em { font-style: italic; font-weight: 400; color: #c8a96e; }
.header-sub { font-size: 11px; color: #6b5e4e; margin-top: 5px; font-weight: 300; }
#refresh-btn {
  background: transparent; border: 1px solid #3a3530; color: #a09080;
  padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  font-family: 'DM Sans', sans-serif; white-space: nowrap; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#refresh-btn:active { background: #1a1714; }

.store-tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
.store-tabs::-webkit-scrollbar { display: none; }
.store-tab {
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: #6b5e4e; padding: 10px 14px; cursor: pointer; font-size: 13px;
  font-family: 'DM Sans', sans-serif; white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
  -webkit-tap-highlight-color: transparent;
}
.store-tab.active { color: #e8e0d5; border-bottom-color: #c8a96e; }
.store-tab.active.lgm { border-bottom-color: #c8a96e; color: #c8a96e; }
.store-tab.active.fs  { border-bottom-color: #d4688a; color: #d4688a; }
.store-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 5px; border-radius: 2px; color: #fff; }

#filters-bar {
  position: sticky; top: 0; z-index: 9;
  background: rgba(14,12,10,0.97); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid #1e1b18; padding: 10px 16px;
}
.filters-inner { display: flex; flex-direction: column; gap: 10px; }
.search-sort-row { display: flex; gap: 10px; align-items: center; }
#search-input {
  flex: 1; background: #1a1714; border: 1px solid #2a2520; color: #e8e0d5;
  padding: 9px 12px; border-radius: 8px; font-size: 14px;
  font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none;
}
#sort-select {
  background: #1a1714; border: 1px solid #2a2520; color: #a09080;
  padding: 8px 10px; border-radius: 8px; font-size: 12px;
  font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
  -webkit-appearance: none; text-align: center;
}
.cat-scroll { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  background: transparent; border: 1px solid #2a2520; color: #6b5e4e;
  padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;
  font-family: 'DM Sans', sans-serif; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.cat-btn.active { background: #c8a96e; border-color: #c8a96e; color: #0e0c0a; font-weight: 500; }

main { position: relative; z-index: 1; padding: 20px 14px 80px; }

#loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; gap: 16px; }
.spinner { width: 34px; height: 34px; border: 2px solid #2a2520; border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { color: #6b5e4e; font-size: 14px; font-style: italic; font-family: 'Cormorant Garamond', serif; }
.loading-detail { color: #3a3530; font-size: 11px; text-align: center; max-width: 260px; line-height: 1.5; }
@keyframes spin { to { transform: rotate(360deg); } }

#error-box { text-align: center; padding: 60px 20px; color: #a09080; }
.error-icon { font-size: 36px; display: block; margin-bottom: 12px; }
#retry-btn { margin-top: 16px; background: #c8a96e; border: none; color: #0e0c0a; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; }

#empty-state { text-align: center; padding: 80px 20px; color: #6b5e4e; font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

#grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.card {
  background: #141210; border: 1px solid #1e1b18; border-radius: 8px;
  overflow: hidden; text-decoration: none; color: inherit; display: block;
  -webkit-tap-highlight-color: transparent;
}
.card:active { opacity: 0.85; transform: scale(0.98); }
.card-img-wrap { position: relative; aspect-ratio: 3/4; background: #1a1714; overflow: hidden; }
.card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.discount-badge { position: absolute; top: 7px; left: 7px; background: #d4688a; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.04em; }
.store-badge { position: absolute; bottom: 7px; right: 7px; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; opacity: 0.9; letter-spacing: 0.1em; }
.card-body { padding: 10px 10px 12px; }
.card-title { font-size: 11px; line-height: 1.4; color: #c8bfb0; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-price-row { display: flex; align-items: baseline; gap: 7px; }
.card-price { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: #e8e0d5; }
.card-old-price { font-size: 11px; color: #5a5048; text-decoration: line-through; }

#pagination { display: flex; justify-content: center; align-items: center; gap: 14px; margin-top: 36px; }
.page-btn { background: transparent; border: 1px solid #2a2520; color: #a09080; padding: 9px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
.page-btn:disabled { opacity: 0.3; pointer-events: none; }
.page-info { color: #6b5e4e; font-size: 13px; }

.hidden { display: none !important; }

<body>
<div id="bg-pattern"></div>

<header>
  <div class="header-inner">
    <div>
      <div class="header-label">FASHION DEALS</div>
      <h1>Le Garage Mode<em> & </em>Frida Shop</h1>
      <p class="header-sub" id="header-sub">Caricamento...</p>
    </div>
    <button id="refresh-btn">↺ Aggiorna</button>
  </div>
  <div class="store-tabs" id="store-tabs">
    <button class="store-tab active" data-store="all">Tutti</button>
    <button class="store-tab lgm" data-store="legaragemode">
      <span class="store-tag" style="background:#c8a96e">LGM</span>Le Garage Mode
    </button>
    <button class="store-tab fs" data-store="fridashop">
      <span class="store-tag" style="background:#d4688a">FS</span>Frida Shop
    </button>
  </div>
</header>

<div id="filters-bar">
  <div class="filters-inner">
    <div class="search-sort-row">
      <input type="search" id="search-input" placeholder="Cerca prodotto..." autocomplete="off" autocorrect="off" />
      <select id="sort-select">
        <option value="discount">Sconto ↓</option>
        <option value="price_asc">Prezzo ↑</option>
        <option value="price_desc">Prezzo ↓</option>
      </select>
    </div>
    <div class="cat-scroll" id="cat-scroll"></div>
  </div>
</div>

<main>
  <div id="loading-wrap">
    <div class="spinner"></div>
    <p class="loading-text">Caricamento offerte...</p>
    <p class="loading-detail" id="loading-detail"></p>
  </div>
  <div id="error-box" class="hidden">
    <span class="error-icon">⚠</span>
    <p id="error-msg">Errore di caricamento</p>
    <button id="retry-btn">Riprova</button>
  </div>
  <div id="empty-state" class="hidden">
    <p class="empty-icon">🔍</p>
    <p>Nessun prodotto trovato.</p>
  </div>
  <div id="grid" class="hidden"></div>
  <div id="pagination" class="hidden"></div>
</main>

<script>
const STORES = [
  { id: 'legaragemode', name: 'Le Garage Mode', url: 'https://legaragemode.com',  apiUrl: 'https://legaragemode.com/products.json?limit=250',  accent: '#c8a96e', tag: 'LGM' },
  { id: 'fridashop',    name: 'Frida Shop',     url: 'https://www.fridashop.net', apiUrl: 'https://www.fridashop.net/products.json?limit=250', accent: '#d4688a', tag: 'FS'  },
];

// Multiple proxies — tried in order until one works
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const CATEGORIES = ['Tutti','In saldo','Abiti','Top','Pantaloni','Giacche','Borse','Scarpe'];
const CAT_KEYWORDS = {
  Abiti:    ['abito','vestito','dress','gonna','skirt'],
  Top:      ['top','t-shirt','maglia','body','blusa','camicia','shirt'],
  Pantaloni:['pantalone','jeans','legging','short'],
  Giacche:  ['giacca','giubbino','cappotto','blazer','coat','bomber'],
  Borse:    ['borsa','bag','clutch','zaino'],
  Scarpe:   ['scarpe','shoes','sneaker','stivale','sandalo','tacco'],
};
const PER_PAGE = 20;

let allProducts = [];
let selectedStore = 'all';
let selectedCat   = 'Tutti';
let sortBy        = 'discount';
let search        = '';
let page          = 1;

const $loadingWrap   = document.getElementById('loading-wrap');
const $loadingDetail = document.getElementById('loading-detail');
const $errorBox      = document.getElementById('error-box');
const $errorMsg      = document.getElementById('error-msg');
const $emptyState    = document.getElementById('empty-state');
const $grid          = document.getElementById('grid');
const $pagination    = document.getElementById('pagination');
const $headerSub     = document.getElementById('header-sub');
const $catScroll     = document.getElementById('cat-scroll');

// Build category buttons
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'Tutti' ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => { selectedCat = cat; page = 1; render(); });
  $catScroll.appendChild(btn);
});

document.getElementById('store-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.store-tab');
  if (!btn) return;
  selectedStore = btn.dataset.store;
  page = 1;
  document.querySelectorAll('.store-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('refresh-btn').addEventListener('click', fetchAll);
document.getElementById('retry-btn').addEventListener('click', fetchAll);
document.getElementById('search-input').addEventListener('input', e => { search = e.target.value; page = 1; render(); });
document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; page = 1; render(); });

// Fetch with proxy fallback
async function fetchWithFallback(apiUrl, storeName) {
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyUrl = PROXIES[i](apiUrl);
    $loadingDetail.textContent = `${storeName}: tentativo ${i + 1}/${PROXIES.length}...`;
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const text = await res.text();
      // Validate it's actually JSON with products
      if (!text.includes('"products"')) continue;
      return JSON.parse(text);
    } catch (e) {
      // Try next proxy
      continue;
    }
  }
  throw new Error('Tutti i proxy hanno fallito per ' + storeName);
}

function parseProducts(data, store) {
  if (!data?.products) return [];
  return data.products
    .filter(p => p.variants?.length > 0)
    .map(p => {
      const v = p.variants[0];
      const price     = parseFloat(v.price);
      const compareAt = parseFloat(v.compare_at_price);
      const discount  = compareAt > price ? Math.round((compareAt - price) / compareAt * 100) : 0;
      return {
        store, title: p.title, price, discount,
        compareAt: compareAt > price ? compareAt : null,
        image: p.images?.[0]?.src || null,
        url: `${store.url}/products/${p.handle}`,
        type: p.product_type || '',
        tags: p.tags || [],
        available: p.variants.some(v => v.available),
      };
    })
    .filter(p => p.available);
}

function matchCat(p, cat) {
  if (cat === 'Tutti') return true;
  if (cat === 'In saldo') return p.discount > 0;
  const hay = (p.title + ' ' + p.type + ' ' + p.tags.join(' ')).toLowerCase();
  return (CAT_KEYWORDS[cat] || []).some(kw => hay.includes(kw));
}

async function fetchAll() {
  show($loadingWrap); hide($errorBox); hide($grid); hide($emptyState); hide($pagination);
  $headerSub.textContent = 'Caricamento...';
  $loadingDetail.textContent = '';

  const results = await Promise.allSettled(
    STORES.map(store => fetchWithFallback(store.apiUrl, store.name).then(data => parseProducts(data, store)))
  );

  const all = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);

  hide($loadingWrap);

  if (all.length === 0) {
    $errorMsg.textContent = 'Impossibile raggiungere i siti. Controlla la connessione e riprova.';
    show($errorBox);
    return;
  }

  allProducts = all;
  const sales = all.filter(p => p.discount > 0).length;
  $headerSub.textContent = `${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})} · ${all.length} prodotti · ${sales} in saldo`;

  // Show partial warning if one store failed
  const failed = results.filter(r => r.status === 'rejected');
  if (failed.length > 0) {
    $headerSub.textContent += ` · ⚠ ${failed.length} negozio non caricato`;
  }

  render();
}

function render() {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === selectedCat);
  });

  const filtered = allProducts
    .filter(p => {
      if (selectedStore !== 'all' && p.store.id !== selectedStore) return false;
      if (!matchCat(p, selectedCat)) return false;
      if (search && !p.title.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    })
    .sort((a, b) => {
      if (sortBy === 'discount')   return b.discount - a.discount;
      if (sortBy === 'price_asc')  return a.price - b.price;
      if (sortBy === 'price_desc') return b.price - a.price;
      return 0;
    });

  if (filtered.length === 0) { show($emptyState); hide($grid); hide($pagination); return; }
  hide($emptyState);

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (page > totalPages) page = totalPages;
  const slice = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  $grid.innerHTML = slice.map(p => `
    <a class="card" href="${p.url}" target="_blank" rel="noopener noreferrer">
      <div class="card-img-wrap">
        ${p.image
          ? `<img class="card-img" src="${p.image}" alt="${escHtml(p.title)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="card-img-placeholder" style="${p.image ? 'display:none' : ''}">👗</div>
        ${p.discount > 0 ? `<div class="discount-badge">–${p.discount}%</div>` : ''}
        <div class="store-badge" style="background:${p.store.accent}">${p.store.tag}</div>
      </div>
      <div class="card-body">
        <p class="card-title">${escHtml(p.title)}</p>
        <div class="card-price-row">
          <span class="card-price">€${p.price.toFixed(2)}</span>
          ${p.compareAt ? `<span class="card-old-price">€${p.compareAt.toFixed(2)}</span>` : ''}
        </div>
      </div>
    </a>
  `).join('');

  show($grid);

  if (totalPages > 1) {
    $pagination.innerHTML = `
      <button class="page-btn" id="prev-btn" ${page === 1 ? 'disabled' : ''}>← Prec</button>
      <span class="page-info">${page} / ${totalPages}</span>
      <button class="page-btn" id="next-btn" ${page === totalPages ? 'disabled' : ''}>Succ →</button>
    `;
    document.getElementById('prev-btn')?.addEventListener('click', () => { page--; render(); window.scrollTo(0, 0); });
    document.getElementById('next-btn')?.addEventListener('click', () => { page++; render(); window.scrollTo(0, 0); });
    show($pagination);
  } else {
    hide($pagination);
  }
}

function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

fetchAll();
</script>

</body>
</html>
